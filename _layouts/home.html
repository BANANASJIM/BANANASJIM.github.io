<script>
// Matrix rain — optimized
const canvas = document.getElementById('matrix-canvas');
if (canvas) {
  const ctx = canvas.getContext('2d');
  let w, h, columns, drops;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    const fontSize = 14;
    columns = Math.floor(w / fontSize);
    drops = Array(columns).fill(0).map(() => Math.random() * h / fontSize | 0);
  }
  resize();

  const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノ0123456789ABCDEF<>{}[]';
  const fontSize = 14;

  function draw() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.06)';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#00ff41';
    ctx.font = fontSize + 'px monospace';

    for (let i = 0; i < drops.length; i++) {
      const text = chars[Math.random() * chars.length | 0];
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);
      if (drops[i] * fontSize > h && Math.random() > 0.975) {
        drops[i] = 0;
      }
      drops[i]++;
    }
  }

  setInterval(draw, 55);
  window.addEventListener('resize', resize);
}

// Staggered fade-in for project cards — pure CSS approach
document.addEventListener('DOMContentLoaded', function() {
  var cards = document.querySelectorAll('.project-unit');
  for (var i = 0; i < cards.length; i++) {
    cards[i].style.animation = 'fadeInUp 0.5s ease-out ' + (i * 0.08) + 's both';
  }
});
</script>
